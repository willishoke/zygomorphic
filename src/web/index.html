<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zygomorphic</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #21262d;
  --border:  #30363d;
  --text:    #e6edf3;
  --dim:     #7d8590;
  --cyan:    #79c0ff;
  --yellow:  #e3b341;
  --green:   #56d364;
  --red:     #f85149;
  --blue:    #58a6ff;
  --purple:  #d2a8ff;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: ui-monospace, 'SF Mono', 'Fira Code', Menlo, monospace;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ---- Header ---- */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
header .logo { font-weight: 700; font-size: 15px; color: var(--cyan); }
header .status { color: var(--dim); font-size: 12px; }
header .node-count { color: var(--dim); font-size: 12px; margin-left: auto; }
.nav-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
}
.nav-btn:hover { color: var(--text); border-color: var(--dim); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

/* ---- View tabs ---- */
.view-tabs {
  display: flex;
  gap: 2px;
  margin-left: 4px;
}
.tab-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--dim);
  padding: 2px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  transition: color 0.1s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--cyan);
  border-color: var(--border);
  background: var(--bg3);
}

/* ---- Two-pane layout (graph mode) ---- */
.panes {
  flex: 1;
  display: flex;
  overflow: hidden;
}
.pane {
  width: 50%;
  height: 100%;
  overflow-y: auto;
}

/* ---- Focal pane (left) ---- */
.focal-pane {
  padding: 20px 24px;
  border-right: 1px solid var(--border);
}
.focal-id {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 4px;
}
.focal-summary {
  font-size: 15px;
  color: var(--cyan);
  margin-bottom: 16px;
  line-height: 1.4;
}
.focal-content {
  white-space: pre-wrap;
  line-height: 1.5;
  padding: 12px;
  background: var(--bg2);
  border-radius: 6px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

/* Exploration */
.exploration-section h4, .comments-section h4 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--dim);
  margin-bottom: 8px;
}
.exploration-entry {
  font-size: 12px;
  color: var(--dim);
  padding: 2px 0;
}

/* Comments */
.comments-section { margin-top: 16px; }
.comment-item {
  padding: 8px 10px;
  background: var(--bg2);
  border-radius: 4px;
  margin-bottom: 6px;
  border: 1px solid var(--border);
}
.comment-meta {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.comment-meta .expiring { color: var(--yellow); }
.comment-body { font-size: 13px; margin-bottom: 6px; }
.comment-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}
.vote-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 1px 7px;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  transition: color 0.1s, border-color 0.1s;
}
.vote-btn:hover { color: var(--text); border-color: var(--dim); }
.vote-btn.voted-up { color: var(--green); border-color: var(--green); }
.vote-btn.voted-down { color: var(--red); border-color: var(--red); }
.delete-btn {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  padding: 1px 4px;
  margin-left: auto;
  opacity: 0.5;
  transition: opacity 0.1s, color 0.1s;
}
.delete-btn:hover { opacity: 1; color: var(--red); }
.comment-input {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.comment-input input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 13px;
}
.comment-input input:focus { outline: none; border-color: var(--cyan); }
.comment-input button {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--cyan);
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
}
.comment-input button:hover { background: var(--border); }

/* ---- Edge pane (right) ---- */
.edge-pane { padding: 0; }
.edge-pane-header {
  padding: 10px 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--dim);
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 1;
}
.edge-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.edge-item:hover { background: var(--bg3); }
.edge-label {
  font-size: 11px;
  margin-bottom: 2px;
  font-weight: 600;
}
.edge-neighbor-id { font-size: 11px; color: var(--dim); }
.edge-neighbor-summary { color: var(--text); line-height: 1.4; }

/* ---- Activity view ---- */
.view-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: none;
}
.view-content.active { display: block; }

.view-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.view-toolbar h2 {
  font-size: 13px;
  font-weight: 600;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.sort-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
}
.sort-btn.active { color: var(--cyan); border-color: var(--cyan); }
.sort-btn:hover:not(.active) { color: var(--text); }
.refresh-link {
  margin-left: auto;
  color: var(--dim);
  cursor: pointer;
  font-size: 12px;
}
.refresh-link:hover { color: var(--text); }

.activity-list { display: flex; flex-direction: column; gap: 8px; }

.activity-card {
  padding: 12px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: border-color 0.1s;
}
.activity-card:hover { border-color: var(--dim); }

.activity-card.node-card { border-left: 3px solid var(--cyan); }
.activity-card.comment-card { border-left: 3px solid var(--purple); }

.activity-kind {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--dim);
  margin-bottom: 4px;
}
.activity-summary {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 6px;
}
.activity-meta {
  font-size: 11px;
  color: var(--dim);
  display: flex;
  gap: 12px;
  align-items: center;
}
.activity-score { color: var(--green); }
.activity-score.negative { color: var(--red); }
.activity-node-ref {
  font-size: 11px;
  color: var(--purple);
  margin-bottom: 4px;
}
.activity-comment-body {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 6px;
  white-space: pre-wrap;
}

/* ---- Stats view ---- */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  text-align: center;
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--cyan);
  margin-bottom: 4px;
}
.stat-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--dim);
}
.stats-section {
  margin-bottom: 20px;
}
.stats-section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--dim);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.stats-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.stats-row:hover .stats-row-label { color: var(--cyan); }
.stats-row-rank { color: var(--dim); font-size: 11px; width: 20px; text-align: right; }
.stats-row-label { flex: 1; line-height: 1.3; }
.stats-row-value { color: var(--dim); font-size: 12px; white-space: nowrap; }
.stats-bar-wrap { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.stats-bar { height: 100%; background: var(--cyan); border-radius: 2px; }

/* ---- Empty state ---- */
.empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--dim);
  font-size: 14px;
}
</style>
</head>
<body>

<header>
  <span class="logo">zygomorphic</span>
  <button class="nav-btn" id="btn-back" onclick="navigateBack()" disabled>&larr;</button>
  <span class="status" id="hdr-status">connecting…</span>
  <div class="view-tabs">
    <button class="tab-btn active" id="tab-graph" onclick="setView('graph')">graph</button>
    <button class="tab-btn" id="tab-activity" onclick="setView('activity')">activity</button>
    <button class="tab-btn" id="tab-stats" onclick="setView('stats')">stats</button>
  </div>
  <span class="node-count" id="hdr-count"></span>
</header>

<div class="panes" id="panes" style="display:none">
  <div class="pane" id="pane-focal"></div>
  <div class="pane" id="pane-edges"></div>
</div>

<div class="view-content" id="view-activity">
  <div class="view-toolbar">
    <h2>activity</h2>
    <button class="sort-btn active" id="sort-recent" onclick="setActivitySort('recent')">recent</button>
    <button class="sort-btn" id="sort-score" onclick="setActivitySort('score')">top</button>
    <span class="refresh-link" onclick="fetchActivity()">↺ refresh</span>
  </div>
  <div class="activity-list" id="activity-list"><div style="color:var(--dim)">loading…</div></div>
</div>

<div class="view-content" id="view-stats">
  <div class="view-toolbar">
    <h2>stats</h2>
    <span class="refresh-link" onclick="fetchStats()">↺ refresh</span>
  </div>
  <div id="stats-body"><div style="color:var(--dim)">loading…</div></div>
</div>

<div class="empty-state" id="empty-state">no graph loaded</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

let state = null;
let focusId = null;
let viewMode = 'graph'; // 'graph' | 'activity' | 'stats'
let activitySort = 'recent'; // 'recent' | 'score'

// ---------------------------------------------------------------------------
// Edge label colors
// ---------------------------------------------------------------------------

const LABEL_COLORS = [
  '#d2a8ff', '#79c0ff', '#56d364', '#e3b341', '#f85149',
  '#58a6ff', '#ff7b72', '#a5d6ff', '#7ee787', '#ffa657',
];
const labelColorMap = {};
let nextColorIdx = 0;

function labelColor(label) {
  if (!labelColorMap[label]) {
    labelColorMap[label] = LABEL_COLORS[nextColorIdx % LABEL_COLORS.length];
    nextColorIdx++;
  }
  return labelColorMap[label];
}

// ---------------------------------------------------------------------------
// SSE connection
// ---------------------------------------------------------------------------

function connect() {
  const es = new EventSource('/events');
  es.onmessage = (e) => {
    try {
      state = JSON.parse(e.data);
      if (state.focusNodeId && state.focusNodeId !== focusId) {
        focusId = state.focusNodeId;
      }
      if (viewMode === 'graph') render();
    } catch {}
  };
  es.onerror = () => {
    document.getElementById('hdr-status').textContent = 'disconnected';
    setTimeout(connect, 2000);
  };
  es.onopen = () => {
    document.getElementById('hdr-status').textContent = '';
  };
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------

function sendAction(action) {
  fetch('/action', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(action),
  }).catch(() => {});
}

function navigateTo(id) {
  if (id === focusId) return;
  focusId = id;
  sendAction({ type: 'navigate', nodeId: id });
  if (viewMode !== 'graph') setView('graph');
  else render();
}

function navigateBack() {
  if (!state || !state.navigationHistory || state.navigationHistory.length <= 1) return;
  const prevId = state.navigationHistory[state.navigationHistory.length - 2];
  focusId = prevId;
  sendAction({ type: 'navigate_back' });
  render();
}

function submitComment() {
  const input = document.getElementById('comment-input');
  if (!input || !input.value.trim() || !focusId) return;
  sendAction({ type: 'add_comment', node_id: focusId, content: input.value.trim(), author: 'human' });
  input.value = '';
}

function voteComment(id, vote) {
  sendAction({ type: 'vote_comment', comment_id: id, author: 'human', vote });
}

function deleteComment(id) {
  sendAction({ type: 'delete_comment', comment_id: id, author: 'human' });
}

function startEditComment(id, currentContent) {
  const item = document.getElementById('comment-' + id);
  if (!item) return;
  const body = item.querySelector('.comment-body');
  const actions = item.querySelector('.comment-actions');
  body.innerHTML =
    `<textarea id="edit-ta-${esc(id)}" style="width:100%;background:var(--bg);border:1px solid var(--cyan);color:var(--text);padding:6px 8px;border-radius:4px;font-family:inherit;font-size:13px;resize:vertical;min-height:60px">${esc(currentContent)}</textarea>`;
  actions.innerHTML =
    `<button class="nav-btn" style="color:var(--cyan)" onclick="saveEditComment('${esc(id)}')">save</button>` +
    `<button class="nav-btn" onclick="cancelEditComment('${esc(id)}', ${JSON.stringify(currentContent)})">cancel</button>`;
}

function saveEditComment(id) {
  const ta = document.getElementById('edit-ta-' + id);
  if (!ta || !ta.value.trim()) return;
  sendAction({ type: 'edit_comment', comment_id: id, author: 'human', content: ta.value.trim() });
}

function cancelEditComment(id, originalContent) {
  // Re-render will happen via SSE; if not yet, restore immediately
  const item = document.getElementById('comment-' + id);
  if (!item) return;
  const body = item.querySelector('.comment-body');
  const actions = item.querySelector('.comment-actions');
  body.innerHTML = esc(originalContent);
  // Restore original actions — re-render handles the rest
  render();
}

// ---------------------------------------------------------------------------
// View switching
// ---------------------------------------------------------------------------

function setView(mode) {
  viewMode = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + mode).classList.add('active');

  document.getElementById('view-activity').classList.remove('active');
  document.getElementById('view-stats').classList.remove('active');

  if (mode === 'graph') {
    render();
  } else if (mode === 'activity') {
    document.getElementById('view-activity').classList.add('active');
    document.getElementById('panes').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
    fetchActivity();
  } else if (mode === 'stats') {
    document.getElementById('view-stats').classList.add('active');
    document.getElementById('panes').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
    fetchStats();
  }
}

function setActivitySort(sort) {
  activitySort = sort;
  document.getElementById('sort-recent').classList.toggle('active', sort === 'recent');
  document.getElementById('sort-score').classList.toggle('active', sort === 'score');
  fetchActivity();
}

// ---------------------------------------------------------------------------
// Activity feed
// ---------------------------------------------------------------------------

async function fetchActivity() {
  const list = document.getElementById('activity-list');
  list.innerHTML = '<div style="color:var(--dim)">loading…</div>';
  try {
    const res = await fetch('/activity?sort=' + activitySort);
    if (!res.ok) throw new Error('fetch failed');
    const items = await res.json();
    list.innerHTML = renderActivityItems(items);
  } catch {
    list.innerHTML = '<div style="color:var(--red)">failed to load</div>';
  }
}

function renderActivityItems(items) {
  if (!items || items.length === 0) {
    return '<div style="color:var(--dim)">no activity yet</div>';
  }
  return items.map(item => {
    if (item.kind === 'node') {
      return `<div class="activity-card node-card" onclick="navigateTo('${esc(item.id)}')">
        <div class="activity-kind">node</div>
        <div class="activity-summary">${esc(item.summary || item.id)}</div>
        <div class="activity-meta">
          <span>${esc(item.id)}</span>
          <span>${item.degree} edge${item.degree !== 1 ? 's' : ''}</span>
          <span>${relTime(item.updated_at)}</span>
        </div>
      </div>`;
    } else {
      const scoreClass = item.score < 0 ? 'activity-score negative' : 'activity-score';
      const scoreSign = item.score > 0 ? '+' : '';
      return `<div class="activity-card comment-card" onclick="navigateTo('${esc(item.node_id)}')">
        <div class="activity-kind">comment</div>
        <div class="activity-node-ref">on: ${esc(item.node_summary || item.node_id)}</div>
        <div class="activity-comment-body">${esc(item.content)}</div>
        <div class="activity-meta">
          <span>${esc(item.author)}</span>
          <span class="${scoreClass}">${scoreSign}${item.score}</span>
          <span>${relTime(item.created_at)}</span>
        </div>
      </div>`;
    }
  }).join('');
}

// ---------------------------------------------------------------------------
// Stats view
// ---------------------------------------------------------------------------

async function fetchStats() {
  const body = document.getElementById('stats-body');
  body.innerHTML = '<div style="color:var(--dim)">loading…</div>';
  try {
    const res = await fetch('/stats');
    if (!res.ok) throw new Error('fetch failed');
    const stats = await res.json();
    body.innerHTML = renderStats(stats);
  } catch {
    body.innerHTML = '<div style="color:var(--red)">failed to load</div>';
  }
}

function renderStats(s) {
  let html = '';

  // Summary cards
  html += '<div class="stats-grid">';
  html += `<div class="stat-card"><div class="stat-value">${s.nodeCount}</div><div class="stat-label">nodes</div></div>`;
  html += `<div class="stat-card"><div class="stat-value">${s.edgeCount}</div><div class="stat-label">edges</div></div>`;
  html += `<div class="stat-card"><div class="stat-value">${s.commentCount}</div><div class="stat-label">comments</div></div>`;
  html += '</div>';

  // Most connected
  if (s.topConnected && s.topConnected.length > 0) {
    const maxDeg = s.topConnected[0].degree || 1;
    html += '<div class="stats-section"><h3>most connected</h3>';
    s.topConnected.forEach((n, i) => {
      const pct = Math.round((n.degree / maxDeg) * 100);
      html += `<div class="stats-row" onclick="navigateTo('${esc(n.id)}')">
        <span class="stats-row-rank">${i + 1}</span>
        <span class="stats-row-label">${esc(n.summary || n.id)}</span>
        <div class="stats-bar-wrap"><div class="stats-bar" style="width:${pct}%"></div></div>
        <span class="stats-row-value">${n.degree} edge${n.degree !== 1 ? 's' : ''}</span>
      </div>`;
    });
    html += '</div>';
  }

  // Most commented
  if (s.topCommented && s.topCommented.some(n => n.commentCount > 0)) {
    const maxCmt = Math.max(...s.topCommented.map(n => n.commentCount), 1);
    html += '<div class="stats-section"><h3>most commented</h3>';
    s.topCommented.filter(n => n.commentCount > 0).forEach((n, i) => {
      const pct = Math.round((n.commentCount / maxCmt) * 100);
      html += `<div class="stats-row" onclick="navigateTo('${esc(n.id)}')">
        <span class="stats-row-rank">${i + 1}</span>
        <span class="stats-row-label">${esc(n.summary || n.id)}</span>
        <div class="stats-bar-wrap"><div class="stats-bar" style="width:${pct}%; background:var(--purple)"></div></div>
        <span class="stats-row-value">${n.commentCount} comment${n.commentCount !== 1 ? 's' : ''}</span>
      </div>`;
    });
    html += '</div>';
  }

  // Edge label distribution
  if (s.labelDistribution && s.labelDistribution.length > 0) {
    const maxCount = s.labelDistribution[0].count || 1;
    html += '<div class="stats-section"><h3>edge labels</h3>';
    s.labelDistribution.forEach((l, i) => {
      const color = labelColor(l.label);
      const pct = Math.round((l.count / maxCount) * 100);
      html += `<div class="stats-row" style="cursor:default">
        <span class="stats-row-rank">${i + 1}</span>
        <span class="stats-row-label" style="color:${color}">${esc(l.label)}</span>
        <div class="stats-bar-wrap"><div class="stats-bar" style="width:${pct}%; background:${color}"></div></div>
        <span class="stats-row-value">${l.count}</span>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

// ---------------------------------------------------------------------------
// Graph helpers
// ---------------------------------------------------------------------------

function getEdgesForNode(graph, nodeId) {
  if (!graph || !graph.edges) return [];
  return Object.values(graph.edges).filter(e => e.a === nodeId || e.b === nodeId);
}

function otherEnd(edge, nodeId) {
  return edge.a === nodeId ? edge.b : edge.a;
}

// ---------------------------------------------------------------------------
// Rendering (graph mode)
// ---------------------------------------------------------------------------

function renderFocalContent(graph, nodeId) {
  if (!graph || !graph.nodes || !graph.nodes[nodeId]) {
    return '<div class="focal-pane"><div style="color:var(--dim)">Node not found</div></div>';
  }

  const node = graph.nodes[nodeId];

  let html = '<div class="focal-pane">';
  html += '<div class="focal-id">' + esc(nodeId) + '</div>';
  html += '<div class="focal-summary">' + esc(node.summary) + '</div>';
  html += '<div class="focal-content">' + esc(node.content) + '</div>';

  // Exploration
  if (node.exploration && node.exploration.length > 0) {
    html += '<div class="exploration-section"><h4>Exploration</h4>';
    node.exploration.forEach(e => {
      const t = new Date(e.timestamp).toLocaleString();
      const c = e.conclusion ? ' — ' + esc(e.conclusion) : '';
      html += '<div class="exploration-entry">' + esc(e.agent) + ' @ ' + t + c + '</div>';
    });
    html += '</div>';
  }

  // Comments
  html += '<div class="comments-section"><h4>Comments</h4>';
  if (state && state.focalComments && state.focalComments.length > 0 && nodeId === focusId) {
    state.focalComments.forEach(c => {
      const expiring = c.expires_at
        ? ' <span class="expiring">expires ' + new Date(c.expires_at).toLocaleString() + '</span>'
        : '';
      const edited = c.updated_at ? ' <span style="color:var(--dim)">(edited)</span>' : '';
      const scoreSign = c.score > 0 ? '+' : '';
      const scoreColor = c.score > 0 ? 'var(--green)' : c.score < 0 ? 'var(--red)' : 'var(--dim)';
      const isOwn = c.author === 'human';
      html += `<div class="comment-item" id="comment-${esc(c.id)}">`;
      html += '<div class="comment-meta">' + esc(c.author) + ' · ' + new Date(c.created_at).toLocaleString() + expiring + edited + '</div>';
      html += '<div class="comment-body">' + esc(c.content) + '</div>';
      html += '<div class="comment-actions">';
      html += `<button class="vote-btn" onclick="voteComment('${esc(c.id)}', 1)">↑ ${Math.max(0, c.score)}</button>`;
      html += `<button class="vote-btn" onclick="voteComment('${esc(c.id)}', -1)">↓</button>`;
      html += `<span style="font-size:12px;color:${scoreColor};margin-left:2px">${scoreSign}${c.score}</span>`;
      if (isOwn) {
        html += `<button class="nav-btn" style="font-size:11px;padding:1px 6px;margin-left:auto" onclick="startEditComment('${esc(c.id)}', ${JSON.stringify(c.content)})">edit</button>`;
        html += `<button class="delete-btn" onclick="deleteComment('${esc(c.id)}')" title="delete">×</button>`;
      }
      html += '</div>';
      html += '</div>';
    });
  }
  html += '<div class="comment-input">';
  html += '<input type="text" id="comment-input" placeholder="Add a comment…" onkeydown="if(event.key===\'Enter\')submitComment()">';
  html += '<button onclick="submitComment()">post</button>';
  html += '</div></div>';

  html += '</div>';
  return html;
}

function renderEdgesContent(graph, nodeId) {
  const edges = getEdgesForNode(graph, nodeId);

  let html = '<div class="edge-pane">';
  html += '<div class="edge-pane-header">edges (' + edges.length + ')</div>';

  if (edges.length === 0) {
    html += '<div style="padding:16px;color:var(--dim)">No edges</div>';
  } else {
    const byLabel = {};
    edges.forEach(e => {
      if (!byLabel[e.label]) byLabel[e.label] = [];
      byLabel[e.label].push(e);
    });

    Object.keys(byLabel).sort().forEach(label => {
      const color = labelColor(label);
      byLabel[label].forEach(e => {
        const neighborId = otherEnd(e, nodeId);
        const neighbor = graph.nodes[neighborId];
        html += '<div class="edge-item" onclick="navigateTo(\'' + esc(neighborId) + '\')">';
        html += '<div class="edge-label" style="color:' + color + '">' + esc(label) + '</div>';
        html += '<div class="edge-neighbor-id">' + esc(neighborId) + '</div>';
        html += '<div class="edge-neighbor-summary">' + esc(neighbor ? neighbor.summary : '(missing)') + '</div>';
        html += '</div>';
      });
    });
  }

  html += '</div>';
  return html;
}

function render() {
  if (!state) return;

  const graph = state.graph;
  const empty = document.getElementById('empty-state');
  const panes = document.getElementById('panes');
  const count = document.getElementById('hdr-count');
  const backBtn = document.getElementById('btn-back');

  // Hide non-graph views
  document.getElementById('view-activity').classList.remove('active');
  document.getElementById('view-stats').classList.remove('active');

  if (!graph || !graph.nodes || Object.keys(graph.nodes).length === 0) {
    empty.style.display = 'flex';
    panes.style.display = 'none';
    count.textContent = '';
    return;
  }

  empty.style.display = 'none';
  panes.style.display = 'flex';

  const nodeCount = Object.keys(graph.nodes).length;
  const edgeCount = Object.keys(graph.edges || {}).length;
  count.textContent = nodeCount + ' nodes · ' + edgeCount + ' edges';

  if (!focusId || !graph.nodes[focusId]) {
    focusId = Object.keys(graph.nodes)[0];
  }

  backBtn.disabled = !state.navigationHistory || state.navigationHistory.length <= 1;

  document.getElementById('pane-focal').innerHTML = renderFocalContent(graph, focusId);
  document.getElementById('pane-edges').innerHTML = renderEdgesContent(graph, focusId);

}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---------------------------------------------------------------------------
// Relative time
// ---------------------------------------------------------------------------

function relTime(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  return Math.floor(days / 30) + 'mo ago';
}

connect();
