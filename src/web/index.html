<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zygomorphic</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #21262d;
  --border:  #30363d;
  --text:    #e6edf3;
  --dim:     #7d8590;
  --cyan:    #79c0ff;
  --yellow:  #e3b341;
  --green:   #56d364;
  --red:     #f85149;
  --blue:    #58a6ff;
  --purple:  #d2a8ff;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: ui-monospace, 'SF Mono', 'Fira Code', Menlo, monospace;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ---- Header ---- */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
header .logo { font-weight: 700; font-size: 15px; color: var(--cyan); }
header .status { color: var(--dim); font-size: 12px; }
header .node-count { color: var(--dim); font-size: 12px; margin-left: auto; }
.nav-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
}
.nav-btn:hover { color: var(--text); border-color: var(--dim); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

/* ---- Carousel ---- */
.carousel-viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.carousel-track {
  display: flex;
  height: 100%;
  transition: transform 0.3s ease;
}
.carousel-track.no-transition {
  transition: none;
}
.carousel-panel {
  width: 50%;
  flex-shrink: 0;
  height: 100%;
  overflow-y: auto;
}

/* ---- Focal pane (left) ---- */
.focal-pane {
  padding: 20px 24px;
  border-right: 1px solid var(--border);
}
.focal-id {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 4px;
}
.focal-summary {
  font-size: 15px;
  color: var(--cyan);
  margin-bottom: 16px;
  line-height: 1.4;
}
.focal-content {
  white-space: pre-wrap;
  line-height: 1.5;
  padding: 12px;
  background: var(--bg2);
  border-radius: 6px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

/* Exploration */
.exploration-section h4, .comments-section h4 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--dim);
  margin-bottom: 8px;
}
.exploration-entry {
  font-size: 12px;
  color: var(--dim);
  padding: 2px 0;
}

/* Comments */
.comments-section { margin-top: 16px; }
.comment-item {
  padding: 8px 10px;
  background: var(--bg2);
  border-radius: 4px;
  margin-bottom: 6px;
  border: 1px solid var(--border);
}
.comment-meta {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 2px;
}
.comment-meta .expiring { color: var(--yellow); }
.comment-body { font-size: 13px; }
.comment-input {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.comment-input input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 13px;
}
.comment-input input:focus { outline: none; border-color: var(--cyan); }
.comment-input button {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--cyan);
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
}
.comment-input button:hover { background: var(--border); }

/* ---- Edge pane (right) ---- */
.edge-pane {
  padding: 0;
}
.edge-pane-header {
  padding: 10px 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--dim);
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 1;
}
.edge-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.edge-item:hover { background: var(--bg3); }
.edge-label {
  font-size: 11px;
  color: var(--purple);
  margin-bottom: 2px;
}
.edge-neighbor-id {
  font-size: 11px;
  color: var(--dim);
}
.edge-neighbor-summary {
  color: var(--text);
  line-height: 1.4;
}

/* ---- Empty state ---- */
.empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--dim);
  font-size: 14px;
}
</style>
</head>
<body>

<header>
  <span class="logo">zygomorphic</span>
  <button class="nav-btn" id="btn-back" onclick="navigateBack()" disabled>&larr;</button>
  <span class="status" id="hdr-status">connecting…</span>
  <span class="node-count" id="hdr-count"></span>
</header>

<div class="carousel-viewport" id="viewport">
  <div class="empty-state" id="empty-state">no graph loaded</div>
  <div class="carousel-track" id="track">
    <div class="carousel-panel" id="panel-prev"></div>
    <div class="carousel-panel" id="panel-focal"></div>
    <div class="carousel-panel" id="panel-edges"></div>
    <div class="carousel-panel" id="panel-next"></div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

let state = null;
let focusId = null;
let animating = false;

// ---------------------------------------------------------------------------
// SSE connection
// ---------------------------------------------------------------------------

function connect() {
  const es = new EventSource('/events');
  es.onmessage = (e) => {
    try {
      state = JSON.parse(e.data);
      if (state.focusNodeId && state.focusNodeId !== focusId) {
        focusId = state.focusNodeId;
      }
      render();
    } catch {}
  };
  es.onerror = () => {
    document.getElementById('hdr-status').textContent = 'disconnected';
    setTimeout(connect, 2000);
  };
  es.onopen = () => {
    document.getElementById('hdr-status').textContent = '';
  };
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------

function sendAction(action) {
  fetch('/action', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(action),
  }).catch(() => {});
}

function navigateTo(id) {
  if (animating || id === focusId) return;
  animating = true;

  const track = document.getElementById('track');
  const nextPanel = document.getElementById('panel-next');

  // Pre-render new focal + edges into the next panel pair
  nextPanel.innerHTML = renderFocalContent(state.graph, id);

  // Slide left
  track.classList.remove('no-transition');
  track.style.transform = 'translateX(-50%)';

  track.addEventListener('transitionend', function handler() {
    track.removeEventListener('transitionend', handler);

    // Update state
    focusId = id;
    sendAction({ type: 'navigate', nodeId: id });

    // Snap back and re-render in place
    track.classList.add('no-transition');
    track.style.transform = 'translateX(0)';
    render();

    // Re-enable transitions after a frame
    requestAnimationFrame(() => {
      track.classList.remove('no-transition');
      animating = false;
    });
  });
}

function navigateBack() {
  if (animating) return;
  if (!state || !state.navigationHistory || state.navigationHistory.length <= 1) return;

  animating = true;
  const prevId = state.navigationHistory[state.navigationHistory.length - 2];
  const track = document.getElementById('track');
  const prevPanel = document.getElementById('panel-prev');

  // Pre-render previous focal into the prev panel
  prevPanel.innerHTML = renderFocalContent(state.graph, prevId);

  // Start shifted left, then animate to 0
  track.classList.add('no-transition');
  track.style.transform = 'translateX(-50%)';

  requestAnimationFrame(() => {
    track.classList.remove('no-transition');
    track.style.transform = 'translateX(0)';
  });

  track.addEventListener('transitionend', function handler() {
    track.removeEventListener('transitionend', handler);

    focusId = prevId;
    sendAction({ type: 'navigate_back' });

    track.classList.add('no-transition');
    track.style.transform = 'translateX(0)';
    render();

    requestAnimationFrame(() => {
      track.classList.remove('no-transition');
      animating = false;
    });
  });
}

function submitComment() {
  const input = document.getElementById('comment-input');
  if (!input || !input.value.trim() || !focusId) return;
  sendAction({
    type: 'add_comment',
    node_id: focusId,
    content: input.value.trim(),
    author: 'human',
  });
  input.value = '';
}

// ---------------------------------------------------------------------------
// Graph helpers
// ---------------------------------------------------------------------------

function getEdgesForNode(graph, nodeId) {
  if (!graph || !graph.edges) return [];
  return Object.values(graph.edges).filter(e => e.a === nodeId || e.b === nodeId);
}

function otherEnd(edge, nodeId) {
  return edge.a === nodeId ? edge.b : edge.a;
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------

function renderFocalContent(graph, nodeId) {
  if (!graph || !graph.nodes || !graph.nodes[nodeId]) {
    return '<div class="focal-pane"><div style="color:var(--dim)">Node not found</div></div>';
  }

  const node = graph.nodes[nodeId];
  const edges = getEdgesForNode(graph, nodeId);

  // Build focal pane
  let focalHtml = '<div class="focal-pane">';
  focalHtml += '<div class="focal-id">' + esc(nodeId) + '</div>';
  focalHtml += '<div class="focal-summary">' + esc(node.summary) + '</div>';
  focalHtml += '<div class="focal-content">' + esc(node.content) + '</div>';

  // Exploration
  if (node.exploration && node.exploration.length > 0) {
    focalHtml += '<div class="exploration-section"><h4>Exploration</h4>';
    node.exploration.forEach(e => {
      const t = new Date(e.timestamp).toLocaleString();
      const c = e.conclusion ? ' — ' + esc(e.conclusion) : '';
      focalHtml += '<div class="exploration-entry">' + esc(e.agent) + ' @ ' + t + c + '</div>';
    });
    focalHtml += '</div>';
  }

  // Comments
  focalHtml += '<div class="comments-section"><h4>Comments</h4>';
  if (state && state.focalComments && state.focalComments.length > 0 && nodeId === focusId) {
    state.focalComments.forEach(c => {
      const expiring = c.expires_at ? ' <span class="expiring">expires ' + new Date(c.expires_at).toLocaleString() + '</span>' : '';
      focalHtml += '<div class="comment-item">';
      focalHtml += '<div class="comment-meta">' + esc(c.author) + ' · ' + new Date(c.created_at).toLocaleString() + expiring + '</div>';
      focalHtml += '<div class="comment-body">' + esc(c.content) + '</div>';
      focalHtml += '</div>';
    });
  }
  focalHtml += '<div class="comment-input">';
  focalHtml += '<input type="text" id="comment-input" placeholder="Add a comment…" onkeydown="if(event.key===\'Enter\')submitComment()">';
  focalHtml += '<button onclick="submitComment()">post</button>';
  focalHtml += '</div></div>';

  focalHtml += '</div>';

  return focalHtml;
}

function renderEdgesContent(graph, nodeId) {
  const edges = getEdgesForNode(graph, nodeId);

  let html = '<div class="edge-pane">';
  html += '<div class="edge-pane-header">edges (' + edges.length + ')</div>';

  if (edges.length === 0) {
    html += '<div style="padding:16px;color:var(--dim)">No edges</div>';
  } else {
    // Group by label
    const byLabel = {};
    edges.forEach(e => {
      if (!byLabel[e.label]) byLabel[e.label] = [];
      byLabel[e.label].push(e);
    });

    Object.keys(byLabel).sort().forEach(label => {
      byLabel[label].forEach(e => {
        const neighborId = otherEnd(e, nodeId);
        const neighbor = graph.nodes[neighborId];
        html += '<div class="edge-item" onclick="navigateTo(\'' + esc(neighborId) + '\')">';
        html += '<div class="edge-label">' + esc(label) + '</div>';
        html += '<div class="edge-neighbor-id">' + esc(neighborId) + '</div>';
        html += '<div class="edge-neighbor-summary">' + esc(neighbor ? neighbor.summary : '(missing)') + '</div>';
        html += '</div>';
      });
    });
  }

  html += '</div>';
  return html;
}

function render() {
  if (!state) return;

  const graph = state.graph;
  const empty = document.getElementById('empty-state');
  const track = document.getElementById('track');
  const count = document.getElementById('hdr-count');
  const backBtn = document.getElementById('btn-back');

  if (!graph || !graph.nodes || Object.keys(graph.nodes).length === 0) {
    empty.style.display = 'flex';
    track.style.display = 'none';
    count.textContent = '';
    return;
  }

  empty.style.display = 'none';
  track.style.display = 'flex';

  const nodeCount = Object.keys(graph.nodes).length;
  const edgeCount = Object.keys(graph.edges || {}).length;
  count.textContent = nodeCount + ' nodes · ' + edgeCount + ' edges';

  // Default focus
  if (!focusId || !graph.nodes[focusId]) {
    focusId = Object.keys(graph.nodes)[0];
  }

  // Back button
  backBtn.disabled = !state.navigationHistory || state.navigationHistory.length <= 1;

  // Render focal + edges into the visible panels
  const focalPanel = document.getElementById('panel-focal');
  const edgesPanel = document.getElementById('panel-edges');

  focalPanel.innerHTML = renderFocalContent(graph, focusId);
  edgesPanel.innerHTML = renderEdgesContent(graph, focusId);
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------

connect();
</script>
</body>
</html>
