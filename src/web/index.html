<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zygomorphic</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #21262d;
  --border:  #30363d;
  --text:    #e6edf3;
  --dim:     #7d8590;
  --cyan:    #79c0ff;
  --yellow:  #e3b341;
  --green:   #56d364;
  --red:     #f85149;
  --blue:    #58a6ff;
  --purple:  #d2a8ff;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: ui-monospace, 'SF Mono', 'Fira Code', Menlo, monospace;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
header .logo { font-weight: 700; font-size: 15px; color: var(--cyan); }
header .status { color: var(--dim); font-size: 12px; }
header .node-count { color: var(--dim); font-size: 12px; margin-left: auto; }

/* ---- Miller columns layout ---- */
.miller-viewport {
  flex: 1;
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-behavior: smooth;
}
.miller-column {
  min-width: 280px;
  max-width: 350px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.miller-column.focal {
  min-width: 400px;
  max-width: 500px;
  background: var(--bg2);
}
.miller-column.faded { opacity: 0.6; }

.column-header {
  padding: 8px 12px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--dim);
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 1;
}
.column-header.focal-header {
  color: var(--cyan);
  background: var(--bg2);
}

/* ---- Node items in columns ---- */
.node-item {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.node-item:hover { background: var(--bg3); }
.node-item.selected { background: var(--bg3); border-left: 3px solid var(--cyan); }
.node-item .node-id {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 2px;
}
.node-item .node-summary {
  color: var(--text);
  line-height: 1.4;
}
.node-item .node-meta {
  font-size: 11px;
  color: var(--dim);
  margin-top: 4px;
}
.node-item .link-badge {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  background: var(--bg3);
  color: var(--purple);
  margin-left: 4px;
}
.node-item .children-count {
  color: var(--blue);
}

/* ---- Focal node detail ---- */
.focal-detail {
  padding: 16px;
}
.focal-detail .focal-id {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 4px;
}
.focal-detail .focal-summary {
  font-size: 14px;
  color: var(--cyan);
  margin-bottom: 12px;
  line-height: 1.4;
}
.focal-detail .focal-content {
  white-space: pre-wrap;
  line-height: 1.5;
  color: var(--text);
  padding: 12px;
  background: var(--bg);
  border-radius: 6px;
  border: 1px solid var(--border);
  max-height: 50vh;
  overflow-y: auto;
}
.focal-detail .focal-links {
  margin-top: 12px;
}
.focal-detail .focal-links h4 {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}
.focal-link-item {
  padding: 4px 8px;
  font-size: 12px;
  cursor: pointer;
  color: var(--purple);
}
.focal-link-item:hover { text-decoration: underline; }
.focal-detail .focal-exploration {
  margin-top: 12px;
}
.focal-detail .focal-exploration h4 {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}
.exploration-entry {
  font-size: 12px;
  color: var(--dim);
  padding: 2px 0;
}

/* ---- Empty state ---- */
.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--dim);
  font-size: 14px;
}
</style>
</head>
<body>

<header>
  <span class="logo">zygomorphic</span>
  <span class="status" id="hdr-status">connecting…</span>
  <span class="node-count" id="hdr-count"></span>
</header>

<div class="miller-viewport" id="viewport">
  <div class="empty-state" id="empty-state">no graph loaded</div>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

let state = null;
let focusId = null;

// ---------------------------------------------------------------------------
// SSE connection
// ---------------------------------------------------------------------------

function connect() {
  const es = new EventSource('/events');
  es.onmessage = (e) => {
    try {
      state = JSON.parse(e.data);
      if (state.focusNodeId) focusId = state.focusNodeId;
      render();
    } catch {}
  };
  es.onerror = () => {
    document.getElementById('hdr-status').textContent = 'disconnected';
    setTimeout(connect, 2000);
  };
  es.onopen = () => {
    document.getElementById('hdr-status').textContent = '';
  };
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------

function sendAction(action) {
  fetch('/action', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(action),
  }).catch(() => {});
}

function focusNode(id) {
  focusId = id;
  sendAction({ type: 'focus', nodeId: id });
  render();
}

// ---------------------------------------------------------------------------
// Graph traversal helpers
// ---------------------------------------------------------------------------

function getAncestorColumns(graph, nodeId, depth) {
  const columns = [];
  let currentIds = [nodeId];

  for (let i = 0; i < depth; i++) {
    const parentIds = new Set();
    for (const id of currentIds) {
      const node = graph.nodes[id];
      if (node) {
        for (const pid of node.parent_ids) parentIds.add(pid);
      }
    }
    if (parentIds.size === 0) break;
    const pids = [...parentIds];
    columns.unshift(pids);
    currentIds = pids;
  }

  return columns;
}

function getDescendantColumns(graph, nodeId, depth) {
  const columns = [];
  let currentIds = [nodeId];

  for (let i = 0; i < depth; i++) {
    const childIds = [];
    for (const id of currentIds) {
      const node = graph.nodes[id];
      if (node) {
        for (const cid of node.children) {
          if (!childIds.includes(cid)) childIds.push(cid);
        }
      }
    }
    if (childIds.length === 0) break;
    columns.push(childIds);
    currentIds = childIds;
  }

  return columns;
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------

function renderNodeItem(graph, id, selected) {
  const node = graph.nodes[id];
  if (!node) return '';

  const meta = [];
  if (node.children.length > 0) {
    meta.push('<span class="children-count">' + node.children.length + ' children</span>');
  }
  if (node.links.length > 0) {
    meta.push('<span class="link-badge">' + node.links.length + ' links</span>');
  }

  return '<div class="node-item' + (selected ? ' selected' : '') + '" onclick="focusNode(\'' + id + '\')">'
    + '<div class="node-id">' + esc(id) + '</div>'
    + '<div class="node-summary">' + esc(node.summary) + '</div>'
    + (meta.length ? '<div class="node-meta">' + meta.join(' ') + '</div>' : '')
    + '</div>';
}

function renderFocalColumn(graph, nodeId) {
  const node = graph.nodes[nodeId];
  if (!node) return '<div class="miller-column focal"><div class="column-header focal-header">focus</div><div class="focal-detail">Node not found</div></div>';

  let linksHtml = '';
  if (node.links.length > 0) {
    const linkItems = node.links.map(l =>
      '<div class="focal-link-item" onclick="focusNode(\'' + l.target + '\')">'
      + l.relation + ' → ' + esc(l.target) + '</div>'
    ).join('');
    linksHtml = '<div class="focal-links"><h4>Links</h4>' + linkItems + '</div>';
  }

  let explorationHtml = '';
  if (node.exploration.length > 0) {
    const entries = node.exploration.map(e => {
      const t = new Date(e.timestamp).toLocaleString();
      const c = e.conclusion ? ' — ' + esc(e.conclusion) : '';
      return '<div class="exploration-entry">' + esc(e.agent) + ' @ ' + t + c + '</div>';
    }).join('');
    explorationHtml = '<div class="focal-exploration"><h4>Exploration</h4>' + entries + '</div>';
  }

  return '<div class="miller-column focal">'
    + '<div class="column-header focal-header">focus</div>'
    + '<div class="focal-detail">'
    + '<div class="focal-id">' + esc(nodeId) + '</div>'
    + '<div class="focal-summary">' + esc(node.summary) + '</div>'
    + '<div class="focal-content">' + esc(node.content) + '</div>'
    + linksHtml
    + explorationHtml
    + '</div></div>';
}

function renderColumn(graph, nodeIds, label, faded, selectedId) {
  const items = nodeIds.map(id => renderNodeItem(graph, id, id === selectedId)).join('');
  return '<div class="miller-column' + (faded ? ' faded' : '') + '">'
    + '<div class="column-header">' + esc(label) + '</div>'
    + items
    + '</div>';
}

function render() {
  if (!state) return;

  const graph = state.graph;
  const empty = document.getElementById('empty-state');
  const viewport = document.getElementById('viewport');
  const count = document.getElementById('hdr-count');

  if (!graph || !graph.nodes || Object.keys(graph.nodes).length === 0) {
    empty.style.display = 'flex';
    count.textContent = '';
    // Clear any columns
    const cols = viewport.querySelectorAll('.miller-column');
    cols.forEach(c => c.remove());
    return;
  }

  empty.style.display = 'none';
  const nodeCount = Object.keys(graph.nodes).length;
  count.textContent = nodeCount + ' nodes';

  // Default focus to first root
  if (!focusId || !graph.nodes[focusId]) {
    focusId = graph.root_ids[0] || Object.keys(graph.nodes)[0];
  }

  const DEPTH = 2;
  const ancestorCols = getAncestorColumns(graph, focusId, DEPTH);
  const descendantCols = getDescendantColumns(graph, focusId, DEPTH);

  let html = '';

  // Ancestor columns (left of focus)
  for (let i = 0; i < ancestorCols.length; i++) {
    const faded = i < ancestorCols.length - 1;
    const label = i === 0 && ancestorCols.length > 1 ? 'ancestors' : 'parent' + (ancestorCols[i].length > 1 ? 's' : '');
    // Determine which node in this column leads to the focus
    const nextCol = i < ancestorCols.length - 1 ? ancestorCols[i + 1] : [focusId];
    const selectedInCol = ancestorCols[i].find(id => {
      const node = graph.nodes[id];
      return node && node.children.some(c => nextCol.includes(c));
    });
    html += renderColumn(graph, ancestorCols[i], label, faded, selectedInCol);
  }

  // Focal column (center)
  html += renderFocalColumn(graph, focusId);

  // Descendant columns (right of focus)
  for (let i = 0; i < descendantCols.length; i++) {
    const faded = i > 0;
    const label = i === 0 ? 'children' : 'descendants';
    html += renderColumn(graph, descendantCols[i], label, faded, null);
  }

  // Replace content (keep empty-state element)
  const cols = viewport.querySelectorAll('.miller-column');
  cols.forEach(c => c.remove());
  viewport.insertAdjacentHTML('beforeend', html);

  // Scroll to center the focal column
  const focalEl = viewport.querySelector('.miller-column.focal');
  if (focalEl) {
    const scrollLeft = focalEl.offsetLeft - (viewport.clientWidth - focalEl.clientWidth) / 2;
    viewport.scrollLeft = Math.max(0, scrollLeft);
  }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---------------------------------------------------------------------------
// Demo state for static deployment
// ---------------------------------------------------------------------------

const DEMO = {
  screen: 'browse',
  loading: false,
  graph: {
    root_ids: ['project'],
    nodes: {
      'project': {
        id: 'project', content: 'A graph-structured memory system for LLM agent teams.',
        summary: 'Zygomorphic: graph memory for agents',
        parent_ids: [], children: ['core', 'ui', 'mcp'], links: [], depth: 0, exploration: []
      },
      'core': {
        id: 'core', content: 'Core data model, state machine, persistence, and summary propagation.',
        summary: 'Core engine: data model, state, persistence',
        parent_ids: ['project'], children: ['types', 'state'], links: [{ target: 'mcp', relation: 'consumed_by' }], depth: 1, exploration: []
      },
      'ui': {
        id: 'ui', content: 'Electron app with bidirectional Miller column navigator.',
        summary: 'Visual interface: Miller columns in Electron',
        parent_ids: ['project'], children: [], links: [], depth: 1, exploration: []
      },
      'mcp': {
        id: 'mcp', content: 'MCP server exposing 10 graph tools over stdio.',
        summary: 'Agent interface: MCP server with 10 tools',
        parent_ids: ['project'], children: [], links: [{ target: 'core', relation: 'depends_on' }], depth: 1,
        exploration: [{ agent: 'explorer-1', timestamp: Date.now() - 60000, conclusion: 'Implementation complete' }]
      },
      'types': {
        id: 'types', content: 'NodeData, GraphData, Link, ExplorationEntry — the generic graph schema.',
        summary: 'Type definitions: nodes, graphs, links',
        parent_ids: ['core'], children: [], links: [], depth: 2, exploration: []
      },
      'state': {
        id: 'state', content: 'Pure reducer with events for all graph mutations.',
        summary: 'State machine: pure reducer, 11 event types',
        parent_ids: ['core'], children: [], links: [], depth: 2, exploration: []
      }
    }
  },
  focusNodeId: 'project'
};

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------

(function init() {
  // Try SSE connection; if it fails, fall back to demo
  const es = new EventSource('/events');
  let connected = false;

  es.onmessage = (e) => {
    connected = true;
    try {
      state = JSON.parse(e.data);
      if (state.focusNodeId) focusId = state.focusNodeId;
      render();
    } catch {}
  };

  es.onerror = () => {
    if (!connected) {
      // No server — use demo state
      es.close();
      state = DEMO;
      focusId = DEMO.focusNodeId;
      document.getElementById('hdr-status').textContent = 'demo';
      render();
    } else {
      document.getElementById('hdr-status').textContent = 'disconnected';
    }
  };

  es.onopen = () => {
    connected = true;
    document.getElementById('hdr-status').textContent = '';
  };
})();
</script>
</body>
</html>
